services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BUILDPLATFORM: linux/amd64
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      WORK_DIR: /data
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - secremediator_data:/data
    restart: unless-stopped

volumes:
  secremediator_data:
    driver: local
